<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rate us - Coffee Time</title>
    <link rel="stylesheet" href="../css/Shop_Style.css">
    <link rel="icon" type="image/png" href="../assets/favicon.svg">
</head>

<body class="rateus-page">
    <nav id="topNav">
        <div class="logo" onclick="window.location.href='../index.html'" style="cursor:pointer">CoffeeTime</div>
        
        <button id="mobile-toggle" class="mobile-toggle" style="display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--primary);">
            <span id="open-icon">☰</span>
            <span id="close-icon" style="display: none;">✕</span>
        </button>

        <ul>
            <li><a href="Menu.html">Menu</a></li>
            <li><a href="Order.html">Order</a></li>
            <li><a href="Orders_History.html">History</a></li>
            <li><a href="RateUs.html" class="active">Rate Us</a></li>
        </ul>
    </nav>

    <div id="rating-section" class="menu-view">
        <div style="text-align: center;">
            <h2 class="auxiliarySitesTitles">Your Feedback</h2>
        </div>

        <div style="max-width: 600px; margin: 40px auto; background: white; padding: 3rem; border-radius: 32px; box-shadow: var(--shadow); border: 1px solid var(--border)">
            <div id="starRating" class="star-rating" style="margin-bottom: 1rem;">
                <span class="star" data-rating="1">★</span>
                <span class="star" data-rating="2">★</span>
                <span class="star" data-rating="3">★</span>
                <span class="star" data-rating="4">★</span>
                <span class="star" data-rating="5">★</span>
            </div>

            <p id="ratingText" style="text-align: center; color: var(--primary); font-weight: 700; font-size: 1.2rem; margin-bottom: 2rem;">Click to rate</p>

            <form id="reviewForm">
                <div class="form-group">
                    <label for="reviewName">Your Name (Optional)</label>
                    <input type="text" id="reviewName" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="reviewText">Your Review (Optional)</label>
                    <textarea id="reviewText" rows="5" placeholder="Tell us about your experience..." style="width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); font-family: inherit; font-size: 1rem;"></textarea>
                </div>

                <button type="submit" id="submitReview" class="add-to-cart" disabled style="background: var(--primary); color: white; margin-top: 1rem;">Submit My Review</button>
            </form>
        </div>

        <div class="rating-reviews-display">
            <h3 class="rating-reviews-title">Recent Reviews</h3>
            <div id="recentRatings">
                <p class="rating-loading-text">Loading reviews...</p>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="../functionalities/Shop_Functionalities.js"></script>
</body>

</html>
