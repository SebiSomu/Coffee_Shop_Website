<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Your Order</title>
    <link rel="stylesheet" href="../css/Shop_Style.css">
    <link rel="icon" type="image/png" href="../assets/favicon.svg">
</head>

<body class="order-page">
    <nav id="topNav">
        <div class="logo" onclick="window.location.href='../index.html'" style="cursor:pointer">CoffeeTime</div>
        
        <button id="mobile-toggle" class="mobile-toggle" style="display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--primary);">
            <span id="open-icon">☰</span>
            <span id="close-icon" style="display: none;">✕</span>
        </button>

        <ul>
            <li><a href="Menu.html">Menu</a></li>
            <li><a href="Order.html" class="active">Order</a></li>
            <li><a href="Orders_History.html">History</a></li>
            <li><a href="RateUs.html">Rate Us</a></li>
        </ul>
    </nav>

    <div id="order-section" class="menu-view">
        <div style="text-align: center;">
            <h2 class="auxiliarySitesTitles">Your Order</h2>
        </div>
        <div class="cart-items">
            <div id="cart-items"></div>
            <h3 id="total"></h3>
        </div>
        <div style="margin-top: 3rem; text-align: center;">
            <button class="add-to-cart" id="send-order" style="background: var(--primary); color: white; max-width: 280px; margin: 0 auto;">Place Order Now</button>
        </div>
    </div>

    <div id="userFormModal" class="modal">
        <div class="modal-content">
            <h3>Complete Your Order Details</h3>
            <form id="userDataForm">
                <div class="form-group">
                    <label for="userName">Full Name:</label>
                    <input type="text" id="userName" name="userName" required placeholder="Enter your full name">
                    <div class="form-error" id="nameError">Please enter a valid name</div>
                </div>

                <div class="form-group">
                    <label for="userPhone">Phone Number:</label>
                    <input type="tel" id="userPhone" name="userPhone" required placeholder="07xx xxx xxx">
                    <div class="form-error" id="phoneError">Please enter a valid phone number</div>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="add-to-cart">Send Order</button>
                    <button type="button" class="qty-btn" id="cancelForm" style="width: auto; padding: 0 1rem; margin-top: 1rem;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="../functionalities/Shop_Functionalities.js"></script>
</body>

</html>
